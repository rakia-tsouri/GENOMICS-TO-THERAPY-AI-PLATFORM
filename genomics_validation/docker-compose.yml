services:
  validation-service:
    build:
      context: .
      dockerfile: genomics_validation/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - bio-network

  redis:
    image: "redis:alpine"
    ports:
      - "6380:6379"
    networks:
      - bio-network

networks:
  bio-network:
    driver: bridge
